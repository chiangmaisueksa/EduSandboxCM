<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อมูลโรงเรียนพื้นที่นวัตกรรมจังหวัดเชียงใหม่</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #f0a500;
    --accent2: #e05c3a;
    --accent3: #3a9bd5;
    --gen1: #2ea043;
    --gen2: #1f6feb;
    --gen3: #a371f7;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #1a2540 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(240,165,0,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: 30%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(58,155,213,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .header-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 4px 16px rgba(240,165,0,0.3);
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Kanit', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .header-text p {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .header-badge {
    margin-left: auto;
    background: rgba(240,165,0,0.12);
    border: 1px solid rgba(240,165,0,0.3);
    color: var(--accent);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ===== MAIN LAYOUT ===== */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  /* ===== STAT CARDS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .stat-card.total::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stat-card.g1::before   { background: var(--gen1); }
  .stat-card.g2::before   { background: var(--gen2); }
  .stat-card.g3::before   { background: var(--gen3); }
  .stat-card.sangkad::before { background: var(--accent3); }
  .stat-icon {
    font-size: 1.8rem;
    margin-bottom: 10px;
  }
  .stat-value {
    font-family: 'Kanit', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .stat-label {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .stat-sub {
    font-size: 0.75rem;
    margin-top: 6px;
    padding: 3px 8px;
    border-radius: 6px;
    display: inline-block;
    font-weight: 500;
  }
  .g1 .stat-sub { background: rgba(46,160,67,0.15); color: var(--gen1); }
  .g2 .stat-sub { background: rgba(31,111,235,0.15); color: var(--gen2); }
  .g3 .stat-sub { background: rgba(163,113,247,0.15); color: var(--gen3); }

  /* ===== CHARTS ROW ===== */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  @media (max-width: 800px) { .charts-row { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
  }
  .chart-title {
    font-family: 'Kanit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .bar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .bar-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    width: 160px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-track {
    flex: 1;
    background: var(--surface2);
    border-radius: 4px;
    height: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }
  .bar-count {
    font-size: 0.78rem;
    color: var(--text);
    font-weight: 600;
    width: 26px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ===== SEARCH + FILTER ===== */
  .controls-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px 10px 42px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,165,0,0.15);
  }
  .search-input::placeholder { color: var(--text-muted); }

  select.filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  select.filter-select:focus { border-color: var(--accent); }

  .result-count {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }
  .result-count span { color: var(--accent); font-weight: 700; }

  /* ===== TABLE ===== */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .table-wrap {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  th {
    padding: 13px 18px;
    font-family: 'Kanit', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    text-align: left;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    transition: color 0.2s;
  }
  th:hover { color: var(--accent); }
  th .sort-icon { margin-left: 4px; opacity: 0.5; }
  th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid rgba(48,54,61,0.6);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(240,165,0,0.04); }

  td {
    padding: 12px 18px;
    font-size: 0.9rem;
    color: var(--text);
  }
  td.num { color: var(--text-muted); font-size: 0.82rem; }
  td.name { font-weight: 500; }
  td.sangkad { color: var(--text-muted); font-size: 0.83rem; }

  .year-badge {
    display: inline-block;
    background: rgba(58,155,213,0.12);
    color: var(--accent3);
    border: 1px solid rgba(58,155,213,0.25);
    border-radius: 6px;
    padding: 2px 9px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .gen-badge {
    display: inline-block;
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .gen-1 { background: rgba(46,160,67,0.15); color: var(--gen1); border: 1px solid rgba(46,160,67,0.25); }
  .gen-2 { background: rgba(31,111,235,0.15); color: var(--gen2); border: 1px solid rgba(31,111,235,0.25); }
  .gen-3 { background: rgba(163,113,247,0.15); color: var(--gen3); border: 1px solid rgba(163,113,247,0.25); }

  .no-result {
    text-align: center;
    padding: 56px 20px;
    color: var(--text-muted);
    font-size: 1rem;
  }
  .no-result .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }

  /* pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }
  .page-info { font-size: 0.82rem; color: var(--text-muted); }
  .page-btns { display: flex; gap: 6px; align-items: center; }
  .page-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.82rem;
    font-family: 'Sarabun', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 700; }
  .page-size-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.82rem;
    font-family: 'Sarabun', sans-serif;
    cursor: pointer;
    outline: none;
  }

  /* highlight match */
  mark {
    background: rgba(240,165,0,0.3);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* footer */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .container { padding: 20px 16px 40px; }
    header { padding: 18px 16px; }
    .header-badge { display: none; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .bar-label { width: 110px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-icon">🏫</div>
    <div class="header-text">
      <h1>โรงเรียนนวัตกรรม จังหวัดเชียงใหม่</h1>
      <p>ระบบสรุปข้อมูลและค้นหาโรงเรียนที่เข้าร่วมโครงการนวัตกรรม</p>
    </div>
    <div class="header-badge" id="headerCount">📊 กำลังโหลด...</div>
  </div>
</header>

<div class="container">
  <div class="stats-grid" id="statsGrid"></div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">🏛 สังกัดโรงเรียน</div>
      <div id="sangkadChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">📆 การเข้าร่วมตามปีการศึกษา</div>
      <div id="yearChart"></div>
    </div>
  </div>

  <div class="controls-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="ค้นหาชื่อโรงเรียน หรือสังกัด...">
    </div>
    <select class="filter-select" id="filterSangkad">
      <option value="">— สังกัดทั้งหมด —</option>
    </select>
    <select class="filter-select" id="filterGen">
      <option value="">— ทุกรุ่น —</option>
      <option value="1">รุ่นที่ 1</option>
      <option value="2">รุ่นที่ 2</option>
      <option value="3">รุ่นที่ 3</option>
    </select>
    <select class="filter-select" id="filterYear">
      <option value="">— ทุกปี —</option>
    </select>
    <div class="result-count" id="resultCount"></div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('id')" id="th-id">ที่ <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('name')" id="th-name">ชื่อโรงเรียน <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('sangkad')" id="th-sangkad">สังกัด <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('year')" id="th-year">ปีที่เข้าร่วม <span class="sort-icon">↕</span></th>
            <th onclick="sortBy('gen')" id="th-gen">รุ่นที่ <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="paginationBar"></div>
  </div>
</div>

<footer>
  ข้อมูลโรงเรียนนวัตกรรม จังหวัดเชียงใหม่ &nbsp;·&nbsp; จัดทำโดยระบบ Dashboard &nbsp;·&nbsp; อัปเดตปี 2568
</footer>

<script>
// ===================== CONFIG =====================
// เปลี่ยน URL ด้านล่างเป็น Raw URL ของไฟล์ inno.csv จาก GitHub ของคุณ
const csvUrl = 'inno.csv'; 

// ===================== STATE =====================
let RAW = [];
let filtered = [];
let sortField = 'id';
let sortAsc = true;
let page = 1;
let pageSize = 20;
let searchQ = '';
let fSangkad = '';
let fGen = '';
let fYear = '';

// ===================== FETCH DATA =====================
function loadData() {
  document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="text-center py-4">กำลังโหลดข้อมูล...</td></tr>`;
  
  Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      // แปลงข้อมูลจาก CSV เข้าสู่โครงสร้างตัวแปร RAW
      RAW = results.data.map(row => ({
        id: row['ที่'] || '',
        name: row['ชื่อโรงเรียน'] || '',
        sangkad: row['สังกัด'] || '',
        year: row['ปีที่เข้าร่วม'] || '',
        gen: row['รุ่นที่'] || ''
      }));
      
      filtered = [...RAW];
      init();
    },
    error: function(err) {
      console.error("Error loading CSV:", err);
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" style="color:var(--accent2);text-align:center;">ไม่สามารถโหลดข้อมูล CSV ได้ กรุณาตรวจสอบ URL</td></tr>`;
    }
  });
}

// ===================== INIT =====================
function init() {
  document.getElementById('headerCount').innerText = `📊 ${RAW.length} โรงเรียน`;
  buildStats();
  buildSangkadChart();
  buildYearChart();
  populateFilters();
  applyFilter();
}

// ===================== STATS =====================
function buildStats() {
  const g1 = RAW.filter(r=>r.gen==='1').length;
  const g2 = RAW.filter(r=>r.gen==='2').length;
  const g3 = RAW.filter(r=>r.gen==='3').length;
  const sangkadCount = new Set(RAW.map(r=>r.sangkad)).size;
  const html = `
    <div class="stat-card total">
      <div class="stat-icon">🏫</div>
      <div class="stat-value">${RAW.length}</div>
      <div class="stat-label">โรงเรียนทั้งหมด</div>
      <div class="stat-sub" style="background:rgba(240,165,0,0.12);color:var(--accent);">จังหวัดเชียงใหม่</div>
    </div>
    <div class="stat-card g1">
      <div class="stat-icon">🌱</div>
      <div class="stat-value">${g1}</div>
      <div class="stat-label">โรงเรียนรุ่นที่ 1</div>
      <div class="stat-sub">ปี 2562</div>
    </div>
    <div class="stat-card g2">
      <div class="stat-icon">🌿</div>
      <div class="stat-value">${g2}</div>
      <div class="stat-label">โรงเรียนรุ่นที่ 2</div>
      <div class="stat-sub">ปี 2563</div>
    </div>
    <div class="stat-card g3">
      <div class="stat-icon">🌳</div>
      <div class="stat-value">${g3}</div>
      <div class="stat-label">โรงเรียนรุ่นที่ 3</div>
      <div class="stat-sub">ปี 2566–2569</div>
    </div>
    <div class="stat-card sangkad">
      <div class="stat-icon">🏛</div>
      <div class="stat-value">${sangkadCount}</div>
      <div class="stat-label">สังกัดที่เข้าร่วม</div>
      <div class="stat-sub" style="background:rgba(58,155,213,0.12);color:var(--accent3);">หน่วยงาน</div>
    </div>
  `;
  document.getElementById('statsGrid').innerHTML = html;
}

// ===================== SANGKAD CHART =====================
function buildSangkadChart() {
  const counts = {};
  RAW.forEach(r => { counts[r.sangkad] = (counts[r.sangkad]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(sorted.length === 0) return;
  const max = sorted[0][1];
  const colors = ['#f0a500','#e05c3a','#3a9bd5','#a371f7','#2ea043','#1f6feb','#e878a0','#46c7a1','#f06a2b','#c7a846','#60a0d8'];
  let html = '';
  sorted.forEach(([name,count],i) => {
    const pct = Math.round(count/max*100);
    html += `<div class="bar-item">
      <div class="bar-label" title="${name}">${name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div>
      <div class="bar-count">${count}</div>
    </div>`;
  });
  document.getElementById('sangkadChart').innerHTML = html;
}

// ===================== YEAR CHART =====================
function buildYearChart() {
  const counts = {};
  RAW.forEach(r => { counts[r.year] = (counts[r.year]||0)+1; });
  const years = Object.keys(counts).sort();
  if(years.length === 0) return;
  const max = Math.max(...Object.values(counts));
  const colors = ['#2ea043','#2ea043','#a371f7','#a371f7','#a371f7','#a371f7','#a371f7','#a371f7'];
  let html = '';
  years.forEach((y,i) => {
    const pct = Math.round(counts[y]/max*100);
    html += `<div class="bar-item">
      <div class="bar-label">${y}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i]||'#3a9bd5'}"></div></div>
      <div class="bar-count">${counts[y]}</div>
    </div>`;
  });
  document.getElementById('yearChart').innerHTML = html;
}

// ===================== FILTERS =====================
function populateFilters() {
  const sangkads = [...new Set(RAW.map(r=>r.sangkad))].filter(Boolean).sort();
  const years = [...new Set(RAW.map(r=>r.year))].filter(Boolean).sort();
  
  const selS = document.getElementById('filterSangkad');
  selS.innerHTML = '<option value="">— สังกัดทั้งหมด —</option>';
  sangkads.forEach(s => { selS.innerHTML += `<option value="${s}">${s}</option>`; });
  
  const selY = document.getElementById('filterYear');
  selY.innerHTML = '<option value="">— ทุกปี —</option>';
  years.forEach(y => { selY.innerHTML += `<option value="${y}">${y}</option>`; });
}

// ===================== APPLY FILTER =====================
function applyFilter() {
  const q = searchQ.trim().toLowerCase();
  filtered = RAW.filter(r => {
    const matchQ = !q || r.name.toLowerCase().includes(q) || r.sangkad.toLowerCase().includes(q);
    const matchS = !fSangkad || r.sangkad === fSangkad;
    const matchG = !fGen || r.gen === fGen;
    const matchY = !fYear || r.year === fYear;
    return matchQ && matchS && matchG && matchY;
  });
  // sort
  filtered.sort((a,b) => {
    let av = a[sortField], bv = b[sortField];
    if (sortField==='id') { av=+av; bv=+bv; }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });
  page = 1;
  renderTable();
}

// ===================== SORT =====================
function sortBy(field) {
  if (sortField === field) { sortAsc = !sortAsc; }
  else { sortField = field; sortAsc = true; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  document.getElementById('th-'+field).classList.add('sorted');
  applyFilter();
}

// ===================== HIGHLIGHT =====================
function hl(text) {
  if (!searchQ.trim()) return text;
  const q = searchQ.trim().replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(q,'gi'), m=>`<mark>${m}</mark>`);
}

// ===================== RENDER TABLE =====================
function renderTable() {
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  page = Math.min(page, totalPages);
  const start = (page-1)*pageSize;
  const end = Math.min(start+pageSize, total);
  const slice = filtered.slice(start, end);

  document.getElementById('resultCount').innerHTML = `แสดง <span>${total}</span> รายการ`;

  const tbody = document.getElementById('tableBody');
  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="no-result"><span class="icon">🔎</span>ไม่พบรายการที่ค้นหา</div></td></tr>`;
  } else {
    tbody.innerHTML = slice.map(r => `
      <tr>
        <td class="num">${r.id}</td>
        <td class="name">${hl(r.name)}</td>
        <td class="sangkad">${hl(r.sangkad)}</td>
        <td><span class="year-badge">${r.year}</span></td>
        <td><span class="gen-badge gen-${r.gen}">รุ่น ${r.gen}</span></td>
      </tr>
    `).join('');
  }

  // pagination
  const bar = document.getElementById('paginationBar');
  let pages = '';
  const delta = 2;
  for (let p=1; p<=totalPages; p++) {
    if (p===1 || p===totalPages || (p>=page-delta && p<=page+delta)) {
      pages += `<button class="page-btn${p===page?' active':''}" onclick="goPage(${p})">${p}</button>`;
    } else if (p===page-delta-1 || p===page+delta+1) {
      pages += `<span style="color:var(--text-muted);padding:0 4px">…</span>`;
    }
  }
  bar.innerHTML = `
    <div class="page-info">หน้า ${page} จาก ${totalPages} (${start+1}–${end} จาก ${total})</div>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(page-1)" ${page<=1?'disabled':''}>‹</button>
      ${pages}
      <button class="page-btn" onclick="goPage(page+1)" ${page>=totalPages?'disabled':''}>›</button>
      <select class="page-size-select" onchange="changePageSize(this.value)">
        ${[10,20,50,100].map(n=>`<option value="${n}"${pageSize===n?' selected':''}>${n}/หน้า</option>`).join('')}
      </select>
    </div>
  `;
}

function goPage(p) { page = p; renderTable(); }
function changePageSize(n) { pageSize = +n; page = 1; renderTable(); }

// ===================== EVENTS =====================
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value; applyFilter();
});
document.getElementById('filterSangkad').addEventListener('change', e => {
  fSangkad = e.target.value; applyFilter();
});
document.getElementById('filterGen').addEventListener('change', e => {
  fGen = e.target.value; applyFilter();
});
document.getElementById('filterYear').addEventListener('change', e => {
  fYear = e.target.value; applyFilter();
});
